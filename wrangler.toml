name = "ai-agent-registry"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
API_VERSION = "1.0.0"
X402_PAYMENT_ADDRESS = "0x0000000000000000000000000000000000000000"
X402_ANALYTICS_PRICE = "1000000000000000"
X402_LEADERBOARD_PRICE = "500000000000000"
JWT_SECRET = "change-me-in-production"

[[kv_namespaces]]
binding = "AGENTS_KV"
id = "your-kv-namespace-id"
preview_id = "your-preview-kv-namespace-id"

[[kv_namespaces]]
binding = "STAKES_KV"
id = "your-stakes-kv-namespace-id"
preview_id = "your-preview-stakes-kv-namespace-id"

[[kv_namespaces]]
binding = "PAYMENTS_KV"
id = "your-payments-kv-namespace-id"
preview_id = "your-preview-payments-kv-namespace-id"
